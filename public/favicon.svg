<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#565699"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- dark rounded bg -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>

  <!-- outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#pg)" stroke-width="2.5"/>

  <!-- center dot -->
  <circle cx="32" cy="32" r="7" fill="url(#pg)"/>

  <!-- top dot — GOLD -->
  <circle cx="32" cy="10" r="4" fill="#f4c542"/>

  <!-- right dot -->
  <circle cx="54" cy="32" r="4" fill="#7b7bd4"/>

  <!-- bottom dot -->
  <circle cx="32" cy="54" r="4" fill="#7b7bd4"/>

  <!-- left dot -->
  <circle cx="10" cy="32" r="4" fill="#7b7bd4"/>

  <!-- connector lines -->
  <line x1="32" y1="14" x2="32" y2="25" stroke="#565699" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="50" y1="32" x2="39" y2="32" stroke="#565699" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="32" y1="50" x2="32" y2="39" stroke="#565699" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="14" y1="32" x2="25" y2="32" stroke="#565699" stroke-width="1.5" stroke-opacity="0.7"/>
</svg>
